<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кеду — учи китайский</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">课度 <span>Кеду</span></div>
  <div class="stats">
    <div class="stat" title="Дней подряд">🔥 <span id="stat-streak">0</span></div>
    <div class="stat" title="Опыт">⭐ <span id="stat-xp">0</span></div>
    <div class="stat hearts" id="stat-hearts" title="Жизни">❤️ <span id="stat-lives">5</span></div>
  </div>
</header>

<main id="app">

  <!-- ГЛАВНЫЙ ЭКРАН: карта уроков -->
  <section id="screen-home" class="screen active">
    <div id="review-card" class="review-card hidden">
      <div>
        <div class="review-title">🔁 Повторение</div>
        <div class="review-sub"><span id="review-count">0</span> слов ждут повторения</div>
      </div>
      <button id="btn-review" class="btn btn-dark">Повторить</button>
    </div>
    <div id="chars-card" class="review-card chars-card">
      <div>
        <div class="review-title">字 Иероглифы</div>
        <div class="review-sub"><span id="chars-progress">0/0</span> знаков выучено — отдельная тренировка чтения и значения</div>
      </div>
      <button id="btn-chars" class="btn btn-yellow">Учить</button>
    </div>
    <div id="lesson-grid" class="lesson-grid"></div>
  </section>

  <!-- ЭКРАН УРОКА / ПОВТОРЕНИЯ -->
  <section id="screen-lesson" class="screen">
    <div class="progress-bar-wrap">
      <button id="btn-exit" class="btn-icon">✕</button>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    </div>

    <div class="card-area">
      <div class="prompt" id="q-prompt-label"></div>
      <div class="prompt-main" id="q-prompt-main"></div>
      <button id="btn-speak" class="btn-speak" title="Озвучить">🔊</button>
    </div>

    <div class="options" id="q-options"></div>

    <div class="feedback hidden" id="feedback">
      <div id="feedback-text"></div>
      <button id="btn-continue" class="btn btn-dark">Дальше</button>
    </div>
  </section>

  <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
  <section id="screen-result" class="screen">
    <div class="result-box">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2 id="result-title">Урок пройден!</h2>
      <div class="result-stats">
        <div>✅ Верно: <span id="result-correct">0</span></div>
        <div>❌ Ошибок: <span id="result-wrong">0</span></div>
        <div>⭐ Получено XP: <span id="result-xp">0</span></div>
      </div>
      <button id="btn-home" class="btn btn-yellow">На главную</button>
    </div>
  </section>

</main>

<script src="words.js"></script>
<script src="app.js"></script>
</body>
</html>
